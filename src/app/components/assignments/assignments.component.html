<section id="assignments" class="assignments-section">
  <div class="container-lg">
    <h2 class="section-title" data-aos="fade-up">Academic Artifacts</h2>
    <div class="row">
      <div
        class="col-lg-4 col-md-6 mb-4"
        *ngFor="let a of assignments; let i = index"
        [attr.data-aos]="'fade-up'"
        [attr.data-aos-delay]="i * 100"
      >
        <div class="card h-100 assignment-card" (click)="openModal(a)" role="button" tabindex="0">
          <div class="card-header">
            <span class="badge bg-primary">{{ a.grade }}</span>
            <span>{{ a.date }}</span>
          </div>
          <div class="card-body">
            <h5 class="card-title">{{ a.title }}</h5>
            <p>{{ a.description }}</p>
            <div>
              <span class="tech" *ngFor="let t of a.tech">{{ t }}</span>
            </div>
          </div>
          <div class="card-footer">
            <small class="text-muted">Click to view details →</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
